<!DOCTYPE html>
<html>
<head>
    <title>Django Blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <<nav class="mb-4 d-flex justify-content-between align-items-center">
    <div>
        <a href="{% url 'task_list' %}" class="btn btn-outline-primary">Home</a>
    </div>
    <div>
        {% if user.is_authenticated %}
            <span class="me-3">Welcome, <strong>{{ user.username }}</strong></span>
            <!-- Django 5.0+ requires a POST request for logout for security -->
            <!-- This is inside your {% if user.is_authenticated %} block -->

            <!-- This is inside your {% if user.is_authenticated %} block -->

            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                 {% csrf_token %}
                 <button type="submit" class="btn btn-sm btn-danger">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-sm btn-success">Login</a>
        {% endif %}
    </div>
</nav>

    <div class="content">
        {% block content %}
        <!-- This is a hole that other pages will fill -->
        {% endblock %}
    </div>
</body>
</html>
